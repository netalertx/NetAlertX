server {
    listen 20211;
    server_name _; #change this to your custom domain if you have one

    # Web-interface files location
    root /var/www/html/netalertx;
    
    # Main page
    index index.php;
    
    #rewrite /app/(.*) / permanent;
    add_header X-Forwarded-Prefix "/netalertx" always;
    proxy_set_header X-Forwarded-Prefix "/netalertx";

    # Specify a character set
    charset utf-8;

    location / {
        # Try to serve files directly, fallback to index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Proxy to the Python backend server
    location /server/ {
        proxy_pass http://127.0.0.1:20212/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix "/netalertx";
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # Alias for /api/ as some users use this for their backend
    location /api/ {
        proxy_pass http://127.0.0.1:20212/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix "/netalertx";
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # FastCGI configuration for PHP
    location ~ \.php$ {
        # Use a Unix socket for better performance
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param QUERY_STRING $query_string;
        
        # NetAlertX environment variables
        fastcgi_param NETALERTX_CONFIG /app/config;
        fastcgi_param NETALERTX_LOG /app/log;
        fastcgi_param NETALERTX_DATA /app;
        fastcgi_param NETALERTX_API /app/api;

        include fastcgi_params;
    }
}
